<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Nhận Diện Món Ăn Việt Nam</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Be+Vietnam+Pro:wght@300;400;500;600&display=swap" rel="stylesheet" />
<style>
  :root {
    --cream: #FAF6EF;
    --warm: #F2E8D5;
    --brown: #7C4A1E;
    --brown-light: #B07340;
    --brown-dark: #3E2010;
    --accent: #D4480A;
    --accent-light: #F5A672;
    --green: #2D6A4F;
    --green-light: #B7D8C7;
    --text: #1A0F05;
    --text-muted: #7A6050;
    --border: rgba(124,74,30,0.15);
    --shadow: 0 4px 32px rgba(124,74,30,0.10);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--cream);
    font-family: 'Be Vietnam Pro', sans-serif;
    color: var(--text);
    min-height: 100vh;
  }

  /* HEADER */
  header {
    background: var(--brown-dark);
    padding: 2rem 2rem 1.5rem;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  header::before {
    content: '';
    position: absolute; inset: 0;
    background: repeating-linear-gradient(
      45deg,
      transparent,
      transparent 20px,
      rgba(255,255,255,0.03) 20px,
      rgba(255,255,255,0.03) 40px
    );
  }
  header h1 {
    font-family: 'Playfair Display', serif;
    font-size: 2.4rem;
    color: var(--accent-light);
    letter-spacing: 0.02em;
    position: relative;
  }
  header p {
    color: rgba(255,255,255,0.55);
    font-size: 0.9rem;
    margin-top: 0.4rem;
    font-weight: 300;
    position: relative;
  }
  .dishes-badge {
    display: inline-flex;
    gap: 0.5rem;
    margin-top: 1rem;
    flex-wrap: wrap;
    justify-content: center;
    position: relative;
  }
  .dish-tag {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(212,72,10,0.4);
    color: var(--accent-light);
    border-radius: 20px;
    padding: 3px 12px;
    font-size: 0.78rem;
    font-weight: 500;
  }

  /* MAIN LAYOUT */
  main {
    max-width: 900px;
    margin: 0 auto;
    padding: 2.5rem 1.5rem 4rem;
  }

  /* UPLOAD ZONE */
  .upload-section {
    background: #fff;
    border: 2px dashed var(--brown-light);
    border-radius: 20px;
    padding: 2.5rem 2rem;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
  }
  .upload-section:hover, .upload-section.dragover {
    border-color: var(--accent);
    background: #FFF9F5;
  }
  .upload-section input[type="file"] {
    position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
  }
  .upload-icon {
    font-size: 3.5rem;
    line-height: 1;
    margin-bottom: 1rem;
  }
  .upload-section h2 {
    font-family: 'Playfair Display', serif;
    font-size: 1.4rem;
    color: var(--brown);
    margin-bottom: 0.4rem;
  }
  .upload-section p {
    color: var(--text-muted);
    font-size: 0.88rem;
  }
  .upload-btn {
    display: inline-block;
    margin-top: 1.2rem;
    background: var(--accent);
    color: #fff;
    border-radius: 30px;
    padding: 0.6rem 1.8rem;
    font-size: 0.9rem;
    font-weight: 600;
    pointer-events: none;
  }

  /* PREVIEW + RESULT PANEL */
  .result-panel {
    display: none;
    margin-top: 2rem;
    gap: 1.5rem;
    align-items: flex-start;
  }
  .result-panel.visible { display: flex; }
  @media (max-width: 640px) { .result-panel { flex-direction: column; } }

  .preview-box {
    flex: 0 0 260px;
    background: #fff;
    border-radius: 16px;
    overflow: hidden;
    border: 1.5px solid var(--border);
    box-shadow: var(--shadow);
  }
  .preview-box img {
    width: 100%; height: 260px; object-fit: cover; display: block;
  }
  .preview-label {
    padding: 0.75rem 1rem;
    font-size: 0.78rem;
    color: var(--text-muted);
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .preview-label span { color: var(--brown); font-weight: 600; }

  .result-box {
    flex: 1;
    background: #fff;
    border-radius: 16px;
    padding: 1.6rem;
    border: 1.5px solid var(--border);
    box-shadow: var(--shadow);
    min-height: 260px;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }

  /* LOADING STATE */
  .loading-state {
    text-align: center;
  }
  .spinner {
    width: 48px; height: 48px;
    border: 3px solid var(--warm);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 1rem;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-state p { color: var(--text-muted); font-size: 0.9rem; }

  /* PREDICTION */
  .prediction-header {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    margin-bottom: 1.2rem;
  }
  .dish-emoji { font-size: 2.4rem; }
  .dish-name {
    font-family: 'Playfair Display', serif;
    font-size: 1.6rem;
    color: var(--brown-dark);
  }
  .confidence-badge {
    margin-left: auto;
    background: var(--green);
    color: #fff;
    border-radius: 20px;
    padding: 4px 14px;
    font-size: 0.85rem;
    font-weight: 600;
    white-space: nowrap;
  }
  .confidence-badge.medium { background: var(--brown-light); }
  .confidence-badge.low { background: #888; }

  .prob-title {
    font-size: 0.78rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-muted);
    margin-bottom: 0.75rem;
    font-weight: 600;
  }
  .prob-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 0.55rem;
  }
  .prob-label {
    font-size: 0.85rem;
    min-width: 110px;
    color: var(--text);
    font-weight: 500;
  }
  .prob-bar-wrap {
    flex: 1;
    height: 8px;
    background: var(--warm);
    border-radius: 4px;
    overflow: hidden;
  }
  .prob-bar-fill {
    height: 100%;
    border-radius: 4px;
    background: var(--accent-light);
    transition: width 0.8s cubic-bezier(0.4,0,0.2,1);
  }
  .prob-bar-fill.top { background: var(--accent); }
  .prob-pct {
    font-size: 0.8rem;
    color: var(--text-muted);
    min-width: 38px;
    text-align: right;
    font-variant-numeric: tabular-nums;
  }

  /* ERROR STATE */
  .error-state {
    text-align: center;
    padding: 1rem 0;
  }
  .error-icon { font-size: 2.5rem; margin-bottom: 0.8rem; }
  .error-state h3 { color: var(--accent); font-size: 1rem; margin-bottom: 0.4rem; }
  .error-state p { color: var(--text-muted); font-size: 0.85rem; line-height: 1.6; }

  /* RESET */
  .reset-btn {
    margin-top: 2rem;
    background: none;
    border: 1.5px solid var(--border);
    border-radius: 30px;
    padding: 0.5rem 1.5rem;
    color: var(--text-muted);
    font-size: 0.85rem;
    cursor: pointer;
    font-family: 'Be Vietnam Pro', sans-serif;
    transition: all 0.15s;
    display: block;
    margin-left: auto;
    margin-right: auto;
  }
  .reset-btn:hover { border-color: var(--brown); color: var(--brown); }

  /* INSTRUCTIONS */
  .instructions {
    margin-top: 2.5rem;
    background: var(--warm);
    border-radius: 16px;
    padding: 1.5rem 1.8rem;
    border: 1px solid rgba(124,74,30,0.12);
  }
  .instructions h3 {
    font-family: 'Playfair Display', serif;
    font-size: 1.05rem;
    color: var(--brown-dark);
    margin-bottom: 1rem;
  }
  .steps { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; }
  .step {
    display: flex;
    gap: 10px;
    align-items: flex-start;
  }
  .step-num {
    width: 26px; height: 26px;
    flex-shrink: 0;
    border-radius: 50%;
    background: var(--brown);
    color: #fff;
    font-size: 0.8rem;
    font-weight: 700;
    display: flex; align-items: center; justify-content: center;
    margin-top: 1px;
  }
  .step p { font-size: 0.85rem; color: var(--text-muted); line-height: 1.5; }
  .step strong { color: var(--brown-dark); display: block; margin-bottom: 2px; }

  /* API NOTE */
  .api-note {
    margin-top: 1.5rem;
    background: #fff;
    border-left: 3px solid var(--accent);
    border-radius: 0 10px 10px 0;
    padding: 1rem 1.2rem;
    font-size: 0.83rem;
    color: var(--text-muted);
    line-height: 1.7;
  }
  .api-note code {
    background: var(--warm);
    border-radius: 4px;
    padding: 1px 6px;
    font-size: 0.82rem;
    color: var(--brown);
    font-family: monospace;
  }

  footer {
    text-align: center;
    padding: 1.5rem;
    color: var(--text-muted);
    font-size: 0.78rem;
    border-top: 1px solid var(--border);
  }
</style>
</head>
<body>

<header>
  <h1>🍜 Nhận Diện Món Ăn Việt</h1>
  <p>Tải ảnh lên để nhận diện món ăn bằng mô hình CNN đã huấn luyện</p>
  <div class="dishes-badge">
    <span class="dish-tag">🍜 Phở</span>
    <span class="dish-tag">🥖 Bánh Mì</span>
    <span class="dish-tag">🍲 Bún Bò Huế</span>
    <span class="dish-tag">🍚 Cơm Tấm</span>
    <span class="dish-tag">🥗 Gỏi Cuốn</span>
  </div>
</header>

<main>
  <!-- Upload zone -->
  <div class="upload-section" id="uploadZone">
    <input type="file" id="fileInput" accept="image/*" />
    <div class="upload-icon">📸</div>
    <h2>Kéo thả hoặc chọn ảnh</h2>
    <p>Hỗ trợ JPG, PNG, WEBP — tối đa 10MB</p>
    <div class="upload-btn">Chọn ảnh từ máy</div>
  </div>

  <!-- Result panel (hidden until image chosen) -->
  <div class="result-panel" id="resultPanel">
    <div class="preview-box">
      <img id="previewImg" src="" alt="Ảnh món ăn" />
      <div class="preview-label">
        📁 <span id="fileName">—</span>
      </div>
    </div>
    <div class="result-box" id="resultBox">
      <!-- States injected by JS -->
    </div>
  </div>

  <button class="reset-btn" id="resetBtn" style="display:none" onclick="resetAll()">
    ↩ Thử ảnh khác
  </button>
  </div>
</main>

<script>
const API_URL = 'http://localhost:5001/predict';

const DISH_EMOJIS = {
  pho: '🍜',
  banh_mi: '🥖',
  bun_bo_hue: '🍲',
  com_tam: '🍚',
  goi_cuon: '🥗',
  banh_xeo: '🥞',
};
const DISH_DISPLAY = {
  pho: 'Phở',
  banh_mi: 'Bánh Mì',
  bun_bo_hue: 'Bún Bò Huế',
  com_tam: 'Cơm Tấm',
  goi_cuon: 'Gỏi Cuốn',
  banh_xeo: 'Bánh Xèo',
};

const fileInput   = document.getElementById('fileInput');
const uploadZone  = document.getElementById('uploadZone');
const resultPanel = document.getElementById('resultPanel');
const resultBox   = document.getElementById('resultBox');
const previewImg  = document.getElementById('previewImg');
const fileNameEl  = document.getElementById('fileName');
const resetBtn    = document.getElementById('resetBtn');

fileInput.addEventListener('change', e => {
  if (e.target.files[0]) handleFile(e.target.files[0]);
});

uploadZone.addEventListener('dragover', e => {
  e.preventDefault();
  uploadZone.classList.add('dragover');
});
uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('dragover'));
uploadZone.addEventListener('drop', e => {
  e.preventDefault();
  uploadZone.classList.remove('dragover');
  const file = e.dataTransfer.files[0];
  if (file && file.type.startsWith('image/')) handleFile(file);
});

function handleFile(file) {
  const reader = new FileReader();
  reader.onload = evt => {
    previewImg.src = evt.target.result;
    fileNameEl.textContent = file.name;
    resultPanel.classList.add('visible');
    uploadZone.style.display = 'none';
    resetBtn.style.display = 'block';
    showLoading();
    sendToAPI(file);
  };
  reader.readAsDataURL(file);
}

function showLoading() {
  resultBox.innerHTML = `
    <div class="loading-state">
      <div class="spinner"></div>
      <p>Đang phân tích món ăn…</p>
    </div>`;
}

async function sendToAPI(file) {
  try {
    const formData = new FormData();
    formData.append('image', file);

    const res = await fetch(API_URL, { method: 'POST', body: formData });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    showResult(data);
  } catch (err) {
    showError(err.message);
  }
}

function showResult(data) {
  const key   = data.dish || '';
  const name  = data.display || DISH_DISPLAY[key] || key;
  const emoji = DISH_EMOJIS[key] || '🍽️';
  const conf  = Math.round((data.confidence || 0) * 100);
  const all   = data.all || {};

  const badgeCls = conf >= 75 ? '' : conf >= 50 ? 'medium' : 'low';
  const badgeTxt = conf >= 75 ? `✓ ${conf}% tự tin` : `${conf}% tự tin`;

  let barsHtml = '';
  const sorted = Object.entries(all).sort((a,b) => b[1]-a[1]);
  sorted.forEach(([k, prob], i) => {
    const pct = Math.round(prob * 100);
    const label = DISH_DISPLAY[k] || k;
    barsHtml += `
      <div class="prob-row">
        <span class="prob-label">${DISH_EMOJIS[k]||'🍽'} ${label}</span>
        <div class="prob-bar-wrap">
          <div class="prob-bar-fill ${i===0?'top':''}" style="width:0%" data-pct="${pct}"></div>
        </div>
        <span class="prob-pct">${pct}%</span>
      </div>`;
  });

  resultBox.innerHTML = `
    <div class="prediction-header">
      <span class="dish-emoji">${emoji}</span>
      <span class="dish-name">${name}</span>
      <span class="confidence-badge ${badgeCls}">${badgeTxt}</span>
    </div>
    <p class="prob-title">Xác suất tất cả các món</p>
    ${barsHtml}
  `;

  setTimeout(() => {
    resultBox.querySelectorAll('.prob-bar-fill').forEach(el => {
      el.style.width = el.dataset.pct + '%';
    });
  }, 80);
}

function showError(msg) {
  const isConn = msg.includes('Failed to fetch') || msg.includes('NetworkError');
  resultBox.innerHTML = `
    <div class="error-state">
      <div class="error-icon">⚠️</div>
      <h3>${isConn ? 'Không kết nối được đến server' : 'Có lỗi xảy ra'}</h3>
      <p>${isConn
        ? 'Hãy đảm bảo Flask server đang chạy tại <code>localhost:5000</code>.<br/>Chạy lệnh: <code>python server.py</code>'
        : msg
      }</p>
    </div>`;
}

function resetAll() {
  resultPanel.classList.remove('visible');
  uploadZone.style.display = '';
  resetBtn.style.display = 'none';
  fileInput.value = '';
  previewImg.src = '';
  resultBox.innerHTML = '';
}
</script>
</body>
</html>
